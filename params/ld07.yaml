ldrobot_ld07_node:
  ros__parameters:
    comm:
      serial_port: '/dev/ld07'       # udev symlink (PICAR2_LD07_0001); fallback: /dev/ttyUSB0
      baudrate: 921600
      timeout_msec: 1000

    lidar:
      frame_id: 'ld07_link'
      topic: '/ld07/scan'
      range_min: 0.005    # 5 mm
      range_max: 0.200    # 200 mm — sensor points down; floor filtered beyond this
      angle_min: -0.7854  # -45°, D1 (right edge)
      angle_max:  0.7854  # +45°, D160 (left edge)
      confidence_min: 0   # 0 = publish all points; raise to suppress noise
