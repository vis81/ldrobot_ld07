ldrobot_ld07_node:
  ros__parameters:
    comm:
      serial_port: '/dev/ttyUSB0'   # override with serial_port launch arg or udev symlink
      baudrate: 921600
      timeout_msec: 1000

    lidar:
      frame_id: 'laser_link'
      topic: '/scan'
      range_min: 0.005    # 5 mm
      range_max: 0.400    # 400 mm
      angle_min: -0.7854  # -45°, D1 (right edge)
      angle_max:  0.7854  # +45°, D160 (left edge)
      confidence_min: 0   # 0 = publish all points; raise to suppress noise
